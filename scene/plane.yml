---
meta:
  name: Primitive
skybox:
  xmaterial: skybox/polyhaven/wasteland_clouds_puresky_4k.hdr
  material: skybox/polyhaven/borghese_gardens_4k.hdr
script:
  scripts:
    - path: lib/common
types:
  - id: player
    type: origo
    front: [0, 0, -1]
    audio:
      listener:
        default: true
    camera:
      default: true
    controllers:
      - type: pawn
      - type: camera_zoom
  - id: directional_light
    mesh:
      path: light
      material_modifier:
        kd: [0.8, 0.8, 0.6, 1.0]
      program: g_light
    flags:
      no_shadow: true
    light:
      type: directional
      diffuse: [0.4, 0.4, 0.4, 1.0]
      xdiffuse: [0.0, 0.9, 0.0, 1.0]
      intensity: 30000
  - id: plane
    mesh:
      vertex:
        type: plane
      material:
        default_programs: true
        tiling: 60
      flags:
        pre_depth: true
    flags:
      no_shadow: true

nodes:
  - type: player
    pos: [2.5, 2, 3]
    active: true
  - type: directional_light
    pos: [-15, 25, 40]
    scale: 2.5
  - type: plane
    position: [0, 0, 0]
    scale: 100
