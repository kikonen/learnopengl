---
meta:
  name: Grid
skybox:
  material: skybox/polyhaven/drakensberg_solitary_mountain_4k.hdr
script:
  scripts:
    - path: lib/common

includes:
  - path: prefab/util/include_grid.yml

types:
  - id: player_fps
    type: origo
    camera:
      default: true
      type: fps
    controllers:
      - type: pawn
      - type: camera_zoom
    audio:
      listener:
        default: true
  - id: dir_light
    type: origo
    mesh:
      path: light
      program: g_light
    flags:
      no_shadow: true
    light:
      type: directional
      diffuse: [0.7, 0.7, 0.7, 1.0]
      intensity: 30000
  - id: origo_marker
    mesh:
      vertex:
        type: box
        size: [0.25, 0.25, 1]
        radius: 0.5
      material:
        name: default_ball
        kd: [0.0, 0.2, 0.8, 1.0]
        mras: [0.2, 0.1, 1.0]
        program: g_tex
        xrender_back: true
      xflags:
        clip: true
      xscale: 0.05
    xflags:
      no_frustum: true
  - id: dir_marker
    mesh:
      vertex:
        type: sphere
        radius: 0.5
      material:
        name: default_ball
        kd: [0.0, 0.8, 0.8, 1.0]
        mras: [0.2, 0.1, 1.0]
        program: g_tex
        xrender_back: true
      xflags:
        clip: true
    xflags:
      no_frustum: true
  - id: grid
    prefab:
      path: prefab/util/prefab_grid.yml

nodes:
  - type: player_fps
    pos: [0, 0.25, 4]
    active: true
    rotation: [0, 180, 0]
  - type: dir_light
    pos: [-15, 25, 25]
  - type: grid
    xscale: 100
  - type: origo_marker
    pos: [0.0, 0.0, 0.0]
  - type: dir_marker
    pos: [0.0, 0.0, -1.0]
    scale: [0.5]
