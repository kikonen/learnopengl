---
name: Origo
skybox:
  program: g_skybox
  material: skybox/polyhaven/drakensberg_solitary_mountain_4k.hdr
script:
  scripts:
    - path: lib/common

includes:
  - path: prefab/util/include_grid.yml

types:
  - id: origo
    type: origo
  - id: player
    type: origo
    audio:
      listener:
        default: true
    camera:
      default: true
    controllers:
      - type: pawn
      - type: camera_zoom
  - id: dir_light
    type: origo
    mesh:
      path: light
      program: g_light
    flags:
      no_shadow: true
    light:
      type: directional
      diffuse: [0.7, 0.7, 0.7, 1.0]
      intensity: 30000
  - id: cube_map
    type: origo
    flags:
      cube_map: true
  - id: wooden_floor
    prefab:
      path: prefab/scenery/prefab_wooden_floor.yml
  - id: elf_female
    mesh:
      path: fbx/characters/Elf/Bodies/Elf Female.fbx
      lod:
        max: 100
      flags:
        xuse_bones: true
        xuse_bones_debug: true
        xuse_animation: true
      materials:
        - name: female_body
          #base: ../textures/Elf Female Body/Elf Female 1
          map_kd: ../textures/Elf Female Body/Elf Female 4/Elf_Female_RIG_female_body_AlbedoOpacity.png
          map_normal: ../textures/Elf Female Body/Elf Female 1/Elf_Female_RIG_female_body_Normal.png
          map_mras: ../textures/Elf Female Body/Elf Female 1/Elf_Female_RIG_female_body_mras
          default_programs: true
          unity: true
        - name: female_elf_eyebrows
          base: ../shared/textures
          map_kd: Eyebrows_Lashes_diff.png
          map_normal: Eyebrows_Lashes_normals.png
          render_back: true
          blend: true
          default_programs: true
          unity: true
        - name: eyeshine
          base: ../shared/textures/Eyes/
          map_kd: HumanEyes_Diffuse3.png
          map_normal: HumanEyes_Normal.png
          map_mras: HumanEyes_mras
          #kd: 6c51ff
          #ke: 6c51ff
          default_programs: true
          unity: true
      program: g_tex
      shadow_program: shadow
      base_scale: 0.01
  - id: elf_female_2
    prefab:
      path: prefab/characters/elf/female/prefab_elf_female.yml
  - id: elf_female_3
    type: composite
    composite: elf_female_3_composite
  - id: elf_female_3_body
    prefab:
      path: prefab/characters/elf/female/prefab_elf_female.yml

composites:
  - id: elf_female_3_composite
    nodes:
      - type: elf_female_3_body
        tag: body

nodes:
  - type: prefab_grid
  - id: player
    type: player
    rotation: [0, 180, 0]
    pos: [0, 1, 5]
    active: true
  - type: dir_light
    pos: [-20, 25, 25]
  - type: cube_map
    pos: [0, 5, 10]
  - type: wooden_floor
    scale: 100

  - type: elf_female
    pos: [0.0, 0.0, -4.0]
  - type: elf_female
    pos: [1.0, .0, -4.0]
    rot: [0, 180, 0]

  - type: origo
    pos: [2.0, 0.0, -4.0]
    children:
      - type: elf_female
  - type: origo
    pos: [3.0, .0, -4.0]
    rot: [0, 180, 0]
    children:
      - type: elf_female

  # - type: elf_female_2
  #   pos: [0.0, 0.0, -2.0]
  # - type: elf_female_2
  #   pos: [1.0, .0, -2.0]
  #   rot: [0, 180, 0]

  # - type: origo
  #   pos: [2.0, 0.0, -2.0]
  #   children:
  #     - type: elf_female_2
  # - type: origo
  #   pos: [3.0, .0, -2.0]
